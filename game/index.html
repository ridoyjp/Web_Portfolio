<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe by リドイ</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4">
  <!-- Main Game Container -->
  <div id="game-container"
    class="bg-[#161b22] p-6 sm:p-10 rounded-xl shadow-2xl w-full max-w-sm border border-[#30363d]">

    <!-- Header and Status -->
    <header class="text-center mb-6">
      <h1 class="text-4xl font-bold text-white mb-2">
        <span class="text-indigo-400">Tic</span>-<span class="text-rose-400">Tac</span>-Toe
      </h1>

      <p class="text-sm text-gray-400 mb-4">
        Developed by <span class="font-semibold text-white">リドイ</span>
      </p>

      <div id="status-message"
        class="h-10 flex items-center justify-center text-lg font-semibold rounded-lg transition-colors duration-300">
        <span class="text-gray-300">Player X's turn</span>
      </div>
    </header>

    <!-- Scoreboard -->
    <div class="flex justify-between items-center mb-6 bg-[#21262d] p-3 rounded-lg">
      <div class="text-center p-2 rounded-md w-1/2">
        <p class="text-xs uppercase tracking-wider text-indigo-400">Player X</p>
        <p id="score-x" class="text-2xl font-bold text-white">0</p>
      </div>
      <div class="text-center p-2 rounded-md w-1/2">
        <p class="text-xs uppercase tracking-wider text-rose-400">Player O</p>
        <p id="score-o" class="text-2xl font-bold text-white">0</p>
      </div>
    </div>

    <!-- Grid -->
    <div id="game-grid" class="grid grid-cols-3 gap-3"></div>

    <!-- Controls -->
    <div class="flex justify-center mt-8 space-x-4">
      <button id="reset-button"
        class="px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white font-semibold rounded-lg shadow-md transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-opacity-50 active:scale-[.98]">
        Reset Board
      </button>

      <button id="new-game-button"
        class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg shadow-md transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-50 active:scale-[.98]">
        New Match (Reset Score)
      </button>
    </div>
  </div>

  <!-- External JS -->
  <script src="script.js"></script>
</body>
</html>
